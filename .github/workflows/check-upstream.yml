name: Check Upstream Release

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 1 AM PST (09:00 UTC)
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get latest upstream version
        id: upstream
        run: |
          # Fetch all tags, filter for macOS pattern, sort by version, and get the highest
          TAG=$(curl -s https://api.github.com/repos/utmapp/vd_agent/tags | jq -r '.[].name' | grep '\-macOS$' | sed 's/spice-vdagent-//; s/-macOS//' | sort -V | tail -n 1)
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Detected upstream version: $TAG"

      - name: Get latest local version
        id: local
        run: |
          # Fetch our own tags to see what we've already built
          LATEST=$(curl -s https://api.github.com/repos/${{ github.repository }}/tags | jq -r '.[].name' | sed -E 's/^(v|spice-vdagent-)//' | sort -V | tail -n 1)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest local version: $LATEST"

      - name: Trigger Build if New
        if: steps.upstream.outputs.version != steps.local.outputs.version
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.upstream.outputs.version }}';
            console.log(`New version detected: ${version}. Creating tag v${version}`);
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/v${version}`,
                sha: context.sha
              });
            } catch (error) {
              console.log(`Tag v${version} might already exist or creation failed: ${error.message}`);
            }
