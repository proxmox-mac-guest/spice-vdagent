name: Build spice-vdagent bottle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream vd_agent version (e.g. 0.22.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
        arch: [x86_64, arm64]
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            UPSTREAM="$VERSION"
          else
            FULL_TAG="${GITHUB_REF_NAME#v}"
            UPSTREAM="$(echo "$FULL_TAG" | cut -d'-' -f1)"
            VERSION="$FULL_TAG"
          fi
          UPSTREAM_TAG="spice-vdagent-${UPSTREAM}-macOS"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION (upstream tag: $UPSTREAM_TAG)"

      - name: Compute Homebrew OS Tag
        id: compute-tag
        run: |
          OS_VERSION="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          case "$OS_VERSION" in
            macos-13) NAME="ventura" ;;
            macos-14) NAME="sonoma" ;;
            macos-15) NAME="sequoia" ;;
            macos-26) NAME="tahoe" ;;
            *) NAME="unknown" ;;
          esac
          if [ "$ARCH" == "arm64" ]; then
            TAG="arm64_$NAME"
          else
            TAG="$NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout UTM vd_agent source
        uses: actions/checkout@v4
        with:
          repository: utmapp/vd_agent
          ref: ${{ steps.version.outputs.upstream_tag }}
          path: vd_agent_source

      - name: Install dependencies (glib)
        run: |
          # Must install BOTH to satisfy Xcode's hardcoded lipo script
          brew install glib || true
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)" || true
          arch -x86_64 /usr/local/bin/brew install glib || true

      - name: Build Xcode archive
        run: |
          cd vd_agent_source
          xcodebuild archive \
            -scheme vd_agent \
            -archivePath vd_agent.xcarchive \
            ARCHS="${{ matrix.arch }}" \
            VALID_ARCHS="${{ matrix.arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            MACOSX_DEPLOYMENT_TARGET=10.13

      - name: Dry-run Test
        run: |
          cd vd_agent_source/vd_agent.xcarchive/Products/usr/local/bin
          if [ "${{ matrix.arch }}" == "x86_64" ]; then
            arch -x86_64 ./spice-vdagentd --help || exit 1
          else
            ./spice-vdagentd --help || exit 1
          fi

      - name: Build Homebrew bottle
        id: bottle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.compute-tag.outputs.tag }}"
          bash scripts/build-bottle.sh \
            vd_agent_source/vd_agent.xcarchive \
            "$VERSION" \
            spice-vdagent \
            "$TAG"

          BOTTLE_FILE=$(ls spice-vdagent-*.bottle.tar.gz 2>/dev/null | head -1)
          if [ -z "$BOTTLE_FILE" ]; then
            echo "ERROR: No bottle file found"
            exit 1
          fi
          BOTTLE_SHA256=$(shasum -a 256 "$BOTTLE_FILE" | cut -d' ' -f1)
          echo "bottle_file=$BOTTLE_FILE" >> "$GITHUB_OUTPUT"
          
          echo "bottle do" > ${TAG}.hash
          echo "  root_url \"https://github.com/proxmox-mac-guest/spice-vdagent/releases/download/spice-vdagent-${VERSION}\"" >> ${TAG}.hash
          echo "  sha256 cellar: :any_skip_relocation, ${TAG}: \"${BOTTLE_SHA256}\"" >> ${TAG}.hash
          echo "end" >> ${TAG}.hash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ steps.compute-tag.outputs.tag }}
          path: |
            ${{ steps.bottle.outputs.bottle_file }}
            *.hash
          retention-days: 1

  release:
    name: Consolidate and Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            FULL_TAG="${GITHUB_REF_NAME#v}"
            VERSION="$FULL_TAG"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: spice-vdagent-${{ steps.version.outputs.version }}
          name: spice-vdagent ${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'alpha') }}
          body: |
            Pre-built Homebrew bottle for spice-vdagent ${{ steps.version.outputs.version }} (macOS).

            Built from https://github.com/utmapp/vd_agent/tree/spice-vdagent-${{ steps.version.outputs.version }}-macOS

            **Install:**
            ```
            brew tap proxmox-mac-guest/spice
            brew install spice-vdagent
            brew services start spice-vdagent
            ```
          files: |
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula in tap repo
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Combine hashes into single block
          echo "bottle do" > new_bottle_block.txt
          echo "  root_url \"https://github.com/proxmox-mac-guest/spice-vdagent/releases/download/spice-vdagent-${VERSION}\"" >> new_bottle_block.txt
          cat artifacts/**/*.hash | grep sha256 >> new_bottle_block.txt
          echo "end" >> new_bottle_block.txt

          git clone https://x-access-token:${GH_TOKEN}@github.com/proxmox-mac-guest/homebrew-spice.git /tmp/homebrew-spice
          cd /tmp/homebrew-spice

          # Replace bottle block
          perl -0777 -pi -e "s/bottle do.*?end\n/\`cat \$ENV{GITHUB_WORKSPACE}\/new_bottle_block.txt\`\n/es" Formula/spice-vdagent.rb

          # Update ARCHS logic
          perl -pi -e 's/"ARCHS=x86_64",\n/"ARCHS=#{Hardware::CPU.arm? ? \"arm64\" : \"x86_64\"}",\n/g' Formula/spice-vdagent.rb
          perl -pi -e 's/"VALID_ARCHS=x86_64",\n/"VALID_ARCHS=#{Hardware::CPU.arm? ? \"arm64\" : \"x86_64\"}",\n/g' Formula/spice-vdagent.rb
          
          # Strip depends_on arch: :x86_64 as final step
          sed -i '/depends_on arch: :x86_64/d' Formula/spice-vdagent.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spice-vdagent.rb
          git diff --cached --quiet || git commit -m "spice-vdagent ${VERSION}: update bottles and arch support"
          git push
